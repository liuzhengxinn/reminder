name = "reminder"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "reminder"

[env.staging]
name = "reminder-staging"

# KV 命名空间配置（默认模板不预设固定 ID，运行 npm run setup 自动生成）

# 静态资源：托管 public/ 目录下的 JS/CSS/HTML 给浏览器
# 使用方式：浏览器访问 /js/lib/api-client.js 等同于 public/js/lib/api-client.js
# 不命中静态资源的请求由 Worker fetch handler 处理（默认行为）
[assets]
directory = "./public"
binding = "ASSETS"

# 定时任务配置 - 每小时检查一次（UTC）






# KV 命名空间配置（自动生成）
[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "346ec65bc6b0456d87afeff77e0307d3"
preview_id = "aafa26c888164f80923d5dbe93aa4c80"

[triggers]
crons = ["0 * * * *"]

# 环境变量（可选，也可以在 Cloudflare Dashboard 中设置）
[vars]
ENVIRONMENT = "production"
